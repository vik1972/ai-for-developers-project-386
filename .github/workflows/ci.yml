name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    # services:
    #  redis:
    #    image: redis
    #    ports:
    #      - 6379:6379
    #    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable curl libjemalloc2 libvips sqlite3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g wait-on

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare test database
        env:
          RAILS_ENV: test
        run: bin/rails db:test:prepare db:seed

      - name: Create required directories
        run: mkdir -p tmp/pids log

      - name: Start Rails server
        env:
          RAILS_ENV: test
          PIDFILE: tmp/pids/server.pid
        run: |
          # Start Rails in background
          nohup bundle exec rails server -p 3001 -b 0.0.0.0 > rails.log 2>&1 &
          echo $! > rails.pid
          sleep 8
          echo "=== Rails log (first 50 lines) ==="
          head -50 rails.log || echo "No log file"
          echo "=== Directory check ==="
          ls -la tmp/pids/ 2>/dev/null || echo "No tmp/pids"
          echo "=== Process check ==="
          ps aux | grep ruby | grep -v grep || echo "No ruby processes"
          echo "=== Checking if server is up ==="
          curl -s http://127.0.0.1:3001/api/public/events || echo "Server not responding"
          npx wait-on http://127.0.0.1:3001/api/public/events --timeout 60000

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          nohup npx vite --host 127.0.0.1 --port 3000 > vite.log 2>&1 &
          echo $! > vite.pid
          sleep 5
          cat vite.log || echo "No vite log"
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-logs
          path: |
            rails.log
            frontend/vite.log

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
